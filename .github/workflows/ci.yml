  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to production
        run: |
          echo "Deploying frontend to production environment..."
          IMAGE_TAG="${{ github.sha }}"

          # TODO: Uncomment and configure ONE of the following deployment methods

          # --- Option A: Kubernetes (EKS) ---
          # aws eks update-kubeconfig --name thecyberhub-production --region ${{ secrets.AWS_REGION }}
          # kubectl set image deployment/thecyberhub-frontend \
          #   frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG} \
